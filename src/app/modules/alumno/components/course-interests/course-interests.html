<div class="max-w-4xl mx-auto p-8 bg-white rounded-2xl shadow-xl mt-12 border border-gray-100">
  <div class="mb-8">
    <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">¿Qué te gustaría aprender?</h2>
    <p class="text-lg text-gray-500 mt-2">Seleccioná los cursos que más te interesen para que podamos avisarte cuando abran inscripciones.</p>
  </div>

  <div *ngIf="loading" class="flex flex-col items-center justify-center p-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
    <p class="text-gray-500 font-medium">Buscando propuestas para vos...</p>
  </div>

  <form *ngIf="!loading" (ngSubmit)="onSubmit()" #interestsForm="ngForm">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-10">
      @for (course of courses; track course._id) {
        <div class="group flex items-center p-4 border-2 border-gray-50 rounded-xl hover:border-blue-200 hover:bg-blue-50/50 transition-all cursor-pointer">
          <mat-checkbox 
            class="w-full"
            [color]="'primary'"
            (change)="toggleInterest(course._id, $event.checked)">
            <div class="ml-2">
              <p class="font-semibold text-gray-800 group-hover:text-blue-700">{{ course.name }}</p>
              <p class="text-sm text-gray-400 line-clamp-1">{{ course.description }}</p>
            </div>
          </mat-checkbox>
        </div>
      }
    </div>

    <div class="mb-8">
      <label class="block text-sm font-bold text-gray-700 mb-3 ml-1">¿Alguna otra idea o sugerencia?</label>
      <mat-form-field class="w-full" appearance="outline">
        <textarea 
          matInput 
          rows="4" 
          name="suggestions" 
          [(ngModel)]="suggestions"
          placeholder="Escribí acá si buscás algún tema específico...">
        </textarea>
      </mat-form-field>
    </div>

    <div class="flex items-center justify-end gap-4">
      <button 
        mat-flat-button 
        color="primary" 
        type="submit" 
        class="h-12 px-10 rounded-lg text-lg font-bold shadow-lg shadow-blue-200"
        [disabled]="selectedCourseIds.length === 0 && !suggestions">
        Enviar Preferencias
      </button>
    </div>
  </form>
</div>
