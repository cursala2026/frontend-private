<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside
    [class]="isSidebarOpen() ? 'translate-x-0' : '-translate-x-full'"
    class="fixed inset-y-0 left-0 z-30 w-64 bg-gray-800 text-white transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0"
  >
    <!-- Logo -->
    <div class="flex items-center justify-between h-16 px-6 bg-gray-900">
      <h1 class="text-xl font-bold">Admin Panel</h1>
      <button
        (click)="toggleSidebar()"
        class="lg:hidden text-gray-400 hover:text-white focus:outline-none"
      >
        <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="mt-6 px-4">
      @for (item of menuItems; track item.route) {
        <a
          [routerLink]="item.route"
          [class.bg-gray-900]="isActiveRoute(item.route)"
          class="flex items-center px-4 py-3 mb-2 text-sm rounded-lg hover:bg-gray-700 transition-colors"
        >
          <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
            <path [attr.d]="item.icon" />
          </svg>
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- User Info -->
    <div class="absolute bottom-0 w-full p-4 bg-gray-900">
      @if (user(); as currentUser) {
        <div class="relative">
          <!-- User Menu Button -->
          <button
            (click)="toggleUserMenu()"
            class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition-colors"
          >
            @if (userProfileImageUrl) {
              <img 
                [src]="userProfileImageUrl" 
                alt="Foto de perfil"
                class="h-10 w-10 rounded-full object-cover flex-shrink-0 border-2 border-gray-700"
                (error)="onImageError($event)"
              />
            } @else {
              <div class="h-10 w-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold flex-shrink-0">
                {{ currentUser.firstName.charAt(0) }}{{ currentUser.lastName.charAt(0) }}
              </div>
            }
            <div class="ml-3 text-left flex-1 min-w-0">
              <p class="text-sm font-medium truncate">{{ currentUser.username }}</p>
            </div>
            <svg 
              class="h-5 w-5 text-gray-400 transition-transform"
              [class.rotate-180]="isUserMenuOpen()"
              fill="currentColor" 
              viewBox="0 0 20 20"
            >
              <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
          </button>

          <!-- Dropdown Menu -->
          @if (isUserMenuOpen()) {
            <div class="absolute bottom-full left-0 right-0 mb-2 bg-gray-800 rounded-lg shadow-lg overflow-hidden border border-gray-700">
              <!-- User Info -->
              <div class="px-4 py-3 border-b border-gray-700">
                <p class="text-sm font-medium text-white">{{ currentUser.firstName }} {{ currentUser.lastName }}</p>
                <p class="text-xs text-gray-400 truncate">{{ currentUser.email }}</p>
              </div>
              
              <!-- Menu Options -->
              <button
                (click)="navigateToProfile()"
                class="w-full flex items-center px-4 py-3 text-sm text-white hover:bg-gray-700 transition-colors"
              >
                <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                Mi Perfil
              </button>
              <button
                (click)="logout()"
                class="w-full flex items-center px-4 py-3 text-sm text-red-400 hover:bg-gray-700 transition-colors"
              >
                <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
                Cerrar Sesión
              </button>
            </div>
          }
        </div>
      }
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Content Area -->
    <main class="h-full overflow-y-auto bg-gray-50 px-6 lg:px-8">
      <!-- Botón toggle sidebar solo en móvil, posición absoluta -->
      <button
        (click)="toggleSidebar()"
        class="lg:hidden fixed top-4 right-4 z-10 p-2 bg-white rounded-lg shadow-lg text-gray-600 hover:text-gray-900 focus:outline-none"
      >
        <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Overlay para cerrar sidebar en móvil -->
<div *ngIf="isSidebarOpen()"
  (click)="toggleSidebar()"
  class="fixed inset-0 z-20 bg-black bg-opacity-50 lg:hidden"
></div>
