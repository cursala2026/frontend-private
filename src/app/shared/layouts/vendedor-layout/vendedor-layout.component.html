<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside
    [class]="isSidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    class="fixed inset-y-0 left-0 z-30 w-64 bg-gray-800 text-white transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0"
  >
    <!-- Logo -->
    <div class="flex items-center justify-between h-16 px-6 bg-gray-900">
      <a routerLink="/vendedor" class="flex items-center hover:opacity-80 transition-opacity">
        <img src="/logo/cursala-negativo.svg" alt="Cursala Logo" class="h-8 w-auto">
      </a>
      <button
        (click)="toggleSidebar()"
        class="lg:hidden text-gray-400 hover:text-white focus:outline-none"
      >
        <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="mt-6 px-4">
      <a
        routerLink="/vendedor/users"
        routerLinkActive="bg-gray-900"
        [routerLinkActiveOptions]="{exact: true}"
        (click)="closeSidebarOnMobile()"
        class="flex items-center px-4 py-3 mb-2 text-sm rounded-lg hover:bg-gray-700 transition-colors"
      >
        <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        Usuarios
      </a>

      <a
        routerLink="/vendedor/profile"
        routerLinkActive="bg-gray-900"
        (click)="closeSidebarOnMobile()"
        class="flex items-center px-4 py-3 mb-2 text-sm rounded-lg hover:bg-gray-700 transition-colors"
      >
        <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
          <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        Mi Perfil
      </a>
    </nav>

    <!-- Logout Button -->
    <div class="absolute bottom-0 w-full p-4 bg-gray-900">
      <button
        (click)="logout()"
        class="w-full flex items-center px-4 py-3 text-sm text-red-400 rounded-lg hover:bg-gray-700 transition-colors"
      >
        <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
          <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Content Area -->
    <main class="h-full overflow-y-auto bg-gray-50 px-3 sm:px-4 lg:px-6">
      <!-- Botón toggle sidebar solo en móvil -->
      <button
        (click)="toggleSidebar()"
        class="lg:hidden fixed top-4 right-4 z-10 p-2 bg-white rounded-lg shadow-lg text-gray-600 hover:text-gray-900 focus:outline-none"
      >
        <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Overlay para cerrar sidebar en móvil -->
@if (isSidebarOpen) {
  <div
    (click)="toggleSidebar()"
    class="fixed inset-0 z-20 bg-black/70 backdrop-blur-sm lg:hidden"
  ></div>
}
