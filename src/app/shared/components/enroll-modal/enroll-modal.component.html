@if (isOpen()) {
  <div class="fixed inset-0 z-50 overflow-y-auto" animate.enter="overlay-enter" animate.leave="overlay-leave">
    <div class="fixed inset-0 bg-black/30 backdrop-blur-sm transition-opacity" (click)="cancel()"></div>

    <div class="flex min-h-full items-center justify-center p-4">
      <div (click)="$event.stopPropagation()"
        class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all w-full max-w-md"
        animate.enter="modal-enter" animate.leave="modal-leave">

        <!-- Header -->
        <div class="px-6 py-4 rounded-t-lg" style="background: linear-gradient(90deg, var(--color-brand-primary), var(--color-brand-primary-dark));">
          <h2 class="text-xl font-bold text-white">Confirmar Inscripción</h2>
        </div>

        <!-- Body -->
        <div class="px-6 py-6">
          <div class="text-center mb-4">
            <svg class="w-16 h-16 text-white mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>

          <p class="text-gray-700 text-center mb-2">¿Deseas inscribirte en el curso?</p>
          @if (courseName()) {
            <p class="text-lg font-semibold text-brand-primary text-center mb-4">{{ courseName() }}</p>
          }

          <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6">
            <p class="text-green-800 text-sm font-medium">✓ Este curso es <span class="font-bold">GRATIS</span></p>
            <p class="text-green-700 text-sm mt-1">Tendrás acceso inmediato al contenido</p>
          </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 flex gap-3 justify-end bg-gray-50 border-t border-gray-200">
          <button (click)="cancel()" [disabled]="isLoading()" class="px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed">Cancelar</button>
          <button (click)="confirm()" [disabled]="isLoading()" class="px-4 py-2 text-white rounded-lg flex items-center gap-2 font-medium disabled:opacity-50 disabled:cursor-not-allowed" style="background-color: var(--color-brand-primary); border: 1px solid var(--color-brand-primary);">
            @if (isLoading()) {
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle></svg>
              <span>Inscribiendo...</span>
            } @else {
              <span>Confirmar Inscripción</span>
            }
          </button>
        </div>
      </div>
    </div>
  </div>
}
