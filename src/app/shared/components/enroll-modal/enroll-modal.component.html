@if (isOpen()) {
  <div 
    class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center transition-opacity duration-300" 
    (click)="cancel()">
    <div class="bg-white rounded-lg shadow-2xl max-w-md w-full mx-4 transform transition-all duration-300 scale-100"
         (click)="$event.stopPropagation()">
      <!-- Header -->
      <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4 rounded-t-lg">
        <h2 class="text-xl font-bold text-white">Confirmar Inscripción</h2>
      </div>

      <!-- Body -->
      <div class="px-6 py-6">
        <div class="text-center mb-4">
          <svg class="w-16 h-16 text-indigo-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>

        <p class="text-gray-700 text-center mb-2">
          ¿Deseas inscribirte en el curso?
        </p>
        
        @if (courseName()) {
          <p class="text-lg font-semibold text-indigo-600 text-center mb-4">
            {{ courseName() }}
          </p>
        }

        <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6">
          <p class="text-green-800 text-sm font-medium">
            ✓ Este curso es <span class="font-bold">GRATIS</span>
          </p>
          <p class="text-green-700 text-sm mt-1">
            Tendrás acceso inmediato al contenido
          </p>
        </div>
      </div>

      <!-- Footer -->
      <div class="border-t border-gray-200 px-6 py-4 flex gap-3 justify-end bg-gray-50 rounded-b-lg">
        <button
          (click)="cancel()"
          [disabled]="isLoading()"
          class="px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Cancelar
        </button>
        <button
          (click)="confirm()"
          [disabled]="isLoading()"
          class="px-4 py-2 text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (isLoading()) {
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Inscribiendo...
          } @else {
            <span>Confirmar Inscripción</span>
          }
        </button>
      </div>
    </div>
  </div>
}
