@if (isOpen()) {
<div class="fixed inset-0 z-50 overflow-y-auto" animate.enter="overlay-enter" animate.leave="overlay-leave">
  <!-- Overlay -->
  <div class="fixed inset-0 bg-black/30 backdrop-blur-sm transition-opacity" (click)="onCancel()"></div>

  <!-- Modal -->
  <div class="flex min-h-full items-center justify-center p-4">
    <div (click)="stopPropagation($event)"
      class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all w-full max-w-lg"
      animate.enter="modal-enter" animate.leave="modal-leave">
      <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
        <div class="sm:flex sm:items-start">


          <!-- Content -->
          <div class="mt-3 text-center sm:mt-0 sm:text-left flex-1">
            <h3 class="text-xl font-bold leading-6 pt-2 pb-2" style="color: var(--color-brand-tertiary);">
              {{ config.title }}
            </h3>
            <div class="mt-2 pb-2">
              <p class="text-sm whitespace-pre-line" style="color: var(--color-brand-tertiary);">
                {{ config.message }}
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div
        class="px-4 py-5 sm:flex sm:flex-row-reverse sm:px-6 gap-4"
        style="background-color: var(--color-brand-tertiary-lighten); border-top: 1px solid var(--color-brand-tertiary-lighten);">
        <button type="button" (click)="onConfirm()"
          [ngClass]="config.confirmButtonClass || ''"
          class="cursor-pointer text-sm text-white font-bold inline-flex items-center transition-all py-2 rounded-full px-4"
          style="background-color: var(--color-brand-primary); border: 1px solid var(--color-brand-primary);">
          {{ config.confirmText || 'Confirmar' }}
        </button>
        <button type="button" (click)="onCancel()"
          [ngClass]="config.cancelButtonClass || ''"
          class="cursor-pointer text-sm bg-transparent font-bold inline-flex items-center border transition-all py-2 rounded-full px-4"
          style="color: var(--color-brand-tertiary); border-color: var(--color-brand-tertiary-lighten);">
          {{ config.cancelText || 'Cancelar' }}
        </button>
      </div>
    </div>
  </div>
</div>
}
