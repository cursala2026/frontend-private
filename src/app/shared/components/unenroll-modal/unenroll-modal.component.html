@if (isOpen()) {
  <div class="fixed inset-0 z-50 overflow-y-auto" animate.enter="overlay-enter" animate.leave="overlay-leave">
    <div class="fixed inset-0 bg-black/30 backdrop-blur-sm transition-opacity" (click)="onClose()"></div>

    <div class="flex min-h-full items-center justify-center p-4">
      <div (click)="$event.stopPropagation()"
        class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all w-full max-w-md"
        animate.enter="modal-enter" animate.leave="modal-leave">

        <!-- Header -->
        <div class="px-6 py-4 rounded-t-lg" style="background: linear-gradient(90deg, var(--color-brand-secondary), var(--color-brand-secondary));">
          <h2 class="text-xl font-bold" style="color: var(--color-brand-secondary-text);">Confirmar Desinscripción</h2>
        </div>

        <!-- Body -->
        <div class="px-6 py-6">
          <div class="text-center mb-4">
            <svg class="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>

          <p class="text-gray-700 text-center mb-2">¿Estás seguro de que deseas desinscribirte del curso?</p>

          @if (courseName()) {
            <p class="text-lg font-semibold text-center mb-4" style="color: var(--color-brand-secondary-text);">{{ courseName() }}</p>
          }

          <p class="text-sm text-gray-500 mb-6 text-center">Esta acción no se puede deshacer. Perderás acceso a todas las clases y materiales del curso.</p>
        </div>

        <!-- Footer -->
        <div class="border-t border-gray-200 px-6 py-4 flex gap-3 justify-end bg-gray-50 rounded-b-lg">
          <button (click)="onClose()" [disabled]="isLoading()" class="px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed">Cancelar</button>
          <button (click)="onConfirm()" [disabled]="isLoading()" class="px-4 py-2 text-white rounded-lg hover:opacity-95 transition-colors font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" style="background-color: var(--color-brand-secondary); color: var(--color-brand-secondary-text); border: 1px solid rgba(0,0,0,0.06);">
            @if (isLoading()) {
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle></svg>
              Desinscribiendo...
            } @else {
              <span>Confirmar Desinscripción</span>
            }
          </button>
        </div>
      </div>
    </div>
  </div>
}
