@if (message) {
  <div class="fixed top-4 right-4 z-50">
    <div class="min-w-60 p-3 rounded-lg shadow-md text-white flex items-center justify-between"
         [class.bg-green-600]="message.type === 'success'"
         [class.bg-red-600]="message.type === 'error'"
         [class.bg-sky-500]="message.type === 'info'">
      <span class="mr-4">{{ message.text }}</span>
      <button class="text-white ml-2 text-xl" (click)="dismiss()">×</button>
    </div>
  </div>
}
