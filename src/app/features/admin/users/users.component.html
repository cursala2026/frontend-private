<div class="h-full flex flex-col">
  <div class="flex-1 flex flex-col max-w-full pt-4">
    <!-- Header -->
    <div class="bg-linear-to-r from-brand-primary to-brand-primary-dark px-5 py-4 sm:px-6 sm:py-5 rounded-xl shadow-lg mb-6">
      <div class="flex flex-col sm:flex-row md:flex-row md:items-center sm:justify-between gap-4 md:gap-6">
        <div class="w-full md:w-auto">
          <h1 class="text-lg md:text-xl sm:text-2xl font-bold text-white mb-1">Gestión de Usuarios</h1>
        </div>
        <div class="flex flex-col sm:flex-row md:flex-row md:items-center gap-2 md:gap-4 w-full md:w-auto">
          <!-- Filtro por Rol -->
          <select
            id="roleFilter"
            [(ngModel)]="selectedRole"
            (change)="onRoleFilterChange(selectedRole)"
            class="px-3 py-2 bg-white/90 backdrop-blur-sm text-brand-primary text-sm font-medium rounded-lg border border-white/20 shadow-sm focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-white/40 transition-all w-full md:w-auto md:min-w-[140px] hover:bg-white cursor-pointer"
            >
            <option value="" class="text-gray-600">Todos los roles</option>
            <option [value]="UserRole.ALUMNO" class="text-gray-900">Alumno</option>
            <option [value]="UserRole.PROFESOR" class="text-gray-900">Profesor</option>
            <option [value]="UserRole.ADMIN" class="text-gray-900">Administrador</option>
            <option [value]="UserRole.VENDEDOR" class="text-gray-900">Vendedor</option>
          </select>
          <!-- Filtro por Curso -->
          <select
            id="courseFilter"
            [(ngModel)]="selectedCourse"
            (change)="onCourseFilterChange(selectedCourse)"
            class="px-3 py-2 bg-white/90 backdrop-blur-sm text-brand-primary text-sm font-medium rounded-lg border border-white/20 shadow-sm focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-white/40 transition-all w-full md:w-auto md:min-w-[180px] hover:bg-white cursor-pointer"
            >
            <option value="" class="text-gray-600">Todos los cursos</option>
            <option value="NO_COURSE" class="text-gray-900">Sin cursos asignados</option>
            @for (course of courses(); track course) {
              <option [value]="course._id || course.id">{{ course.title || course.name }}</option>
            }
          </select>
          <!-- (Se eliminó checkbox porque existe opción 'Sin cursos asignados' en el select) -->
          <button
            (click)="editUser({})"
            class="inline-flex items-center gap-2 px-4 py-2.5 bg-brand-secondary text-brand-secondary-text text-sm font-medium rounded-lg hover:bg-brand-secondary/90 focus:ring-4 focus:ring-white/20 transition-all shadow-md hover:shadow-lg whitespace-nowrap cursor-pointer w-full md:w-auto mt-2 md:mt-0 justify-center"
            >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            Nuevo Usuario
          </button>
          <!-- Opcional: los botones de exportación los maneja ahora `app-data-table` vía inputs -->
        </div>
      </div>
    </div>

    <!-- Data Table -->
    <div class="flex-1 min-h-0 bg-gray-50">
      <app-data-table
        [data]="users()"
        [config]="tableConfig"
        [loading]="loading()"
        [pagination]="pagination()"
        [showExportButtons]="true"
        [isFiltered]="!!(selectedRole || selectedCourse || searchTerm)"
        [exportFilteredFn]="getFilteredUsersForExport"
        [exportAllFn]="getAllUsersForExport"
        [exportFilenamePrefix]="getExportFilenamePrefix()"
        [exportFields]="['firstName','lastName','phone','email']"
        [exportContextLabel]="getExportContextLabel()"
        (sortChange)="onSortChange($event)"
        (pageChange)="onPageChange($event)"
        (searchChange)="onSearchChange($event)"
        />
      </div>
    </div>
  </div>

  <!-- Modal -->
  <app-modal-data-table
    [isOpen]="isModalOpen"
    [config]="modalConfig"
    [data]="selectedUser"
    (close)="onModalClose()"
    (save)="onModalSave($event)"
    (fieldChange)="onModalFieldChange($event)"
    />

    <!-- Modal de Gestión de Cursos -->
    <app-student-courses-modal
      [isOpen]="showCoursesModal"
      [studentId]="selectedStudentForCourses?._id || ''"
      [studentName]="selectedStudentForCourses ? (selectedStudentForCourses.firstName + ' ' + selectedStudentForCourses.lastName) : ''"
      (close)="closeCoursesModal()"
      (coursesUpdated)="onCoursesUpdated()"
      />
