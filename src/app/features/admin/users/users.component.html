<div class="h-full flex flex-col">
  <div class="flex-1 flex flex-col max-w-full pt-4">
    <!-- Header -->
    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-5 py-4 sm:px-6 sm:py-5 rounded-xl shadow-lg mb-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h1 class="text-xl sm:text-2xl font-bold text-white mb-1">Gestión de Usuarios 👥</h1>
          <p class="text-indigo-100 text-sm">Administra los usuarios del sistema</p>
        </div>
        <button 
          (click)="editUser({})"
          class="inline-flex items-center gap-2 px-4 py-2.5 bg-white text-indigo-600 text-sm font-medium rounded-lg hover:bg-indigo-50 focus:ring-4 focus:ring-white/20 transition-all shadow-md hover:shadow-lg whitespace-nowrap"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
          Nuevo Usuario
        </button>
      </div>
    </div>

    <!-- Data Table -->
    <div class="flex-1 min-h-0 bg-gray-50">
      <app-data-table
        [data]="users()"
        [config]="tableConfig"
        [loading]="loading()"
        [pagination]="pagination()"
        (sortChange)="onSortChange($event)"
        (pageChange)="onPageChange($event)"
        (searchChange)="onSearchChange($event)"
      />
    </div>
  </div>
</div>

<!-- Modal -->
<app-modal-data-table
  [isOpen]="isModalOpen"
  [config]="modalConfig"
  [data]="selectedUser"
  (close)="onModalClose()"
  (save)="onModalSave($event)"
/>
