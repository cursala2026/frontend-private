<div class="pt-4">
  <!-- Header -->
  <div class="bg-linear-to-r from-emerald-500 to-teal-600 px-5 py-4 sm:px-6 sm:py-5 rounded-xl shadow-lg mb-6">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold text-white mb-1">Pagos de Mercado Pago 💳</h1>
        <p class="text-emerald-100 text-sm">Lista de pagos procesados a través de Mercado Pago</p>
      </div>
      <button
        (click)="openBankAccountsModal()"
        class="inline-flex items-center gap-2 px-4 py-2.5 bg-white text-emerald-600 text-sm font-medium rounded-lg hover:bg-emerald-50 focus:ring-4 focus:ring-white/20 transition-all shadow-md hover:shadow-lg whitespace-nowrap"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
        </svg>
        Gestionar Cuentas Bancarias
      </button>
    </div>
  </div>

  <!-- Payments Table -->
  <app-table
    [data]="payments()"
    [columns]="tableColumns"
    [actions]="tableActions"
    [loading]="loadingPayments()"
    [trackByField]="'_id'"
    [pageSize]="10"
    emptyMessage="Los pagos aparecerán aquí cuando se procesen a través de Mercado Pago"
  ></app-table>

  <app-modal-bank-accounts [isOpen]="showBankAccountsModal" (close)="closeBankAccountsModal()"></app-modal-bank-accounts>

  <app-confirm-modal
    [isOpen]="showDeleteModal"
    [config]="deleteModalConfig"
    (confirm)="confirmDeletePayment()"
    (cancel)="cancelDeletePayment()"
  ></app-confirm-modal>
</div>
