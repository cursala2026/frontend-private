<div class="h-full flex flex-col">
  <div class="flex-1 flex flex-col max-w-full pt-4">
    <!-- Header -->
    <div class="bg-gradient-to-r from-amber-500 to-orange-600 px-5 py-4 sm:px-6 sm:py-5 rounded-xl shadow-lg mb-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h1 class="text-xl sm:text-2xl font-bold text-white mb-1">Gestión de Cursos 📚</h1>
          <p class="text-amber-100 text-sm">Administra los cursos del sistema</p>
        </div>
        <button
          (click)="editCourse({})"
          class="inline-flex items-center gap-2 px-4 py-2.5 bg-white text-amber-600 text-sm font-medium rounded-lg hover:bg-amber-50 focus:ring-4 focus:ring-white/20 transition-all shadow-md hover:shadow-lg whitespace-nowrap"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
          </svg>
          Nuevo Curso
        </button>
      </div>
    </div>

    <!-- Data Table -->
    <div class="flex-1 min-h-0 bg-gray-50">
      <app-data-table
        [data]="courses()"
        [config]="tableConfig"
        [loading]="loading()"
        [pagination]="pagination()"
        (sortChange)="onSortChange($event)"
        (pageChange)="onPageChange($event)"
        (searchChange)="onSearchChange($event)"
      />
    </div>
  </div>
</div>

<!-- Modal para editar/crear cursos -->
<app-modal-data-table
  [isOpen]="isModalOpen"
  [config]="modalConfig"
  [data]="selectedCourse"
  (close)="onModalClose()"
  (save)="onModalSave($event)"
/>

<!-- Modal para asignar profesores -->
<app-teacher-assignment-modal
  [isOpen]="isTeacherAssignmentModalOpen()"
  [courseId]="selectedCourseForAssignment?._id || ''"
  [courseName]="selectedCourseForAssignment?.name || ''"
  [currentMainTeacher]="selectedCourseForAssignment?.mainTeacherInfo || selectedCourseForAssignment?.mainTeacher"
  (close)="onTeacherAssignmentModalClose()"
  (refreshCourses)="onTeacherAssignmentRefresh()"
/>
