<div class="max-w-4xl mx-auto space-y-6">
  <!-- Header -->
  <div class="bg-white shadow rounded-lg p-6">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Editar Curso</h1>
        <p class="mt-1 text-sm text-gray-500">Modifica la información del curso</p>
      </div>
      <button
        (click)="cancel()"
        class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
      >
        Cancelar
      </button>
    </div>
  </div>

  @if (loading()) {
    <div class="bg-white shadow rounded-lg p-12 text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
      <p class="mt-4 text-gray-500">Cargando curso...</p>
    </div>
  } @else {
    <form [formGroup]="courseForm" (ngSubmit)="onSubmit()" class="bg-white shadow rounded-lg p-6 space-y-6">
      <!-- Image Section -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Imagen del Curso
        </label>
        <div class="flex items-center space-x-4">
          @if (imagePreview) {
            <div class="relative w-48 h-32 rounded-lg overflow-hidden border border-gray-300">
              <img
                [src]="imagePreview"
                alt="Preview"
                class="w-full h-full object-cover"
                (error)="handleImageError($event)"
              />
            </div>
          }
          <div>
            <input
              type="file"
              accept="image/*"
              (change)="onImageSelected($event)"
              class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"
            />
            <p class="mt-1 text-xs text-gray-500">PNG, JPG hasta 10MB</p>
          </div>
        </div>
      </div>

      <!-- Name -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
          Nombre del Curso <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          id="name"
          formControlName="name"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Nombre del curso"
        />
        @if (courseForm.get('name')?.invalid && courseForm.get('name')?.touched) {
          <p class="mt-1 text-sm text-red-600">El nombre es requerido</p>
        }
      </div>

      <!-- Description -->
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
          Descripción Corta
        </label>
        <textarea
          id="description"
          formControlName="description"
          rows="3"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Descripción breve del curso"
        ></textarea>
      </div>

      <!-- Long Description -->
      <div>
        <label for="longDescription" class="block text-sm font-medium text-gray-700 mb-2">
          Descripción Larga
        </label>
        <textarea
          id="longDescription"
          formControlName="longDescription"
          rows="5"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Descripción detallada del curso"
        ></textarea>
      </div>

      <!-- Grid: Modality, Price, Max Installments -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label for="modality" class="block text-sm font-medium text-gray-700 mb-2">
            Modalidad
          </label>
          <select
            id="modality"
            formControlName="modality"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          >
            <option value="">Seleccionar...</option>
            <option value="Presencial">Presencial</option>
            <option value="Online">Online</option>
            <option value="Híbrido">Híbrido</option>
          </select>
        </div>

        <div>
          <label for="price" class="block text-sm font-medium text-gray-700 mb-2">
            Precio
          </label>
          <input
            type="number"
            id="price"
            formControlName="price"
            min="0"
            step="0.01"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="0"
          />
        </div>

        <div>
          <label for="maxInstallments" class="block text-sm font-medium text-gray-700 mb-2">
            Máximo de Cuotas
          </label>
          <input
            type="number"
            id="maxInstallments"
            formControlName="maxInstallments"
            min="1"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="1"
          />
        </div>
      </div>

      <!-- Interest Free Checkbox -->
      <div class="flex items-center">
        <input
          type="checkbox"
          id="interestFree"
          formControlName="interestFree"
          class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
        />
        <label for="interestFree" class="ml-2 block text-sm text-gray-700">
          Sin Interés
        </label>
      </div>

      <!-- Grid: Days, Time -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="days" class="block text-sm font-medium text-gray-700 mb-2">
            Días de la Semana
          </label>
          <input
            type="text"
            id="days"
            formControlName="days"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="Lunes, Miércoles, Viernes"
          />
        </div>

        <div>
          <label for="time" class="block text-sm font-medium text-gray-700 mb-2">
            Horario (HH:mm)
          </label>
          <input
            type="text"
            id="time"
            formControlName="time"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="18:00"
          />
        </div>
      </div>

      <!-- Grid: Start Date, Registration Date -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="startDate" class="block text-sm font-medium text-gray-700 mb-2">
            Fecha de Inicio
          </label>
          <input
            type="date"
            id="startDate"
            formControlName="startDate"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>

        <div>
          <label for="registrationOpenDate" class="block text-sm font-medium text-gray-700 mb-2">
            Fecha de Apertura de Inscripciones
          </label>
          <input
            type="date"
            id="registrationOpenDate"
            formControlName="registrationOpenDate"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>
      </div>

      <!-- Grid: Number of Classes, Duration -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="numberOfClasses" class="block text-sm font-medium text-gray-700 mb-2">
            Número de Clases
          </label>
          <input
            type="number"
            id="numberOfClasses"
            formControlName="numberOfClasses"
            min="0"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="0"
          />
        </div>

        <div>
          <label for="duration" class="block text-sm font-medium text-gray-700 mb-2">
            Duración (horas)
          </label>
          <input
            type="number"
            id="duration"
            formControlName="duration"
            min="0"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="0"
          />
        </div>
      </div>

      <!-- Submit Button -->
      <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200">
        <button
          type="button"
          (click)="cancel()"
          class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="saving() || courseForm.invalid"
          class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (saving()) {
            <span class="flex items-center">
              <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Guardando...
            </span>
          } @else {
            Guardar Cambios
          }
        </button>
      </div>
    </form>
  }
</div>
