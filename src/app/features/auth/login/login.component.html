<div class="min-h-screen bg-linear-to-t from-brand-primary/90 to-white">
  <img ngSrc="/images/sections/hero/cursos.jpg" alt="Fondo login" fill class="object-cover object-center opacity-10 pointer-events-none select-none z-0" aria-hidden="true" />

  <main>
    <div class="flex min-h-screen items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
      <div class="w-full max-w-md">
        
        <!-- Logo -->
        <div class="text-center">
          <a (click)="goToPublicFrontend()" class="inline-block rounded-2xl p-4 cursor-pointer">
            <img ngSrc="/logo/cursala.svg" alt="Cursala Logo" width="220" height="42" priority class="mx-auto" style="color: transparent;" />
          </a>
        </div>

        <!-- Card -->
        <div class="rounded-2xl relative bg-white/85 p-8 shadow-xl">
          
          <h3 class="mb-6 text-center text-2xl font-bold tracking-tight text-brand-primary ">Iniciar Sesión</h3>
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6" autocomplete="on">
            @if (errorMessage()) {
              <div class="rounded-md bg-red-500 p-4">
                <div class="flex">
                  <div class="shrink-0">
                    <svg class="h-5 w-5 text-white/80" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                  </div>
                  <div class="ml-3">
                    <p class="text-sm font-medium text-red-50">{{ errorMessage() }}</p>
                  </div>
                </div>
              </div>
            }

            <div>
              <label for="username" class="block text-sm font-normal text-brand-tertiary ">Usuario o Email</label>
              <div class="mt-1 relative">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                  <svg class="h-5 w-5 text-brand-tertiary-lighten" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <input id="username" type="text" formControlName="username" placeholder="Ingresa tu usuario" class="block w-full rounded-lg border border-gray-300 bg-gray-50 py-3 pl-10 pr-3 text-gray-900 placeholder-gray-400 transition focus:border-brand-primary focus:outline-none focus:ring-2 focus:ring-brand-primary " required />
              </div>
            </div>

            <div>
              <label for="password" class="block text-sm font-normal text-brand-tertiary">Contraseña</label>
              <div class="mt-1 relative">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                  <svg class="h-5 w-5 text-brand-tertiary-lighten" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Ingresa tu contraseña" class="block w-full rounded-lg border border-gray-300 bg-gray-50 py-3 pl-10 pr-10 text-gray-900 placeholder-gray-400 transition focus:border-brand-primary focus:outline-none focus:ring-2 focus:ring-brand-primary" required />
                <button type="button" (click)="togglePassword()" aria-label="Mostrar contraseña" class="absolute inset-y-0 right-0 cursor-pointer flex items-center pr-3 text-brand-tertiary-lighten hover:text-brand-tertiary material-symbols-outlined">
                  {{ showPassword() ? 'visibility_off' : 'visibility' }}
                </button>
              </div>
            </div>

            <div class="flex items-center justify-between">
              <div class="flex items-center">
                <input id="remember-me" type="checkbox" class="h-4 w-4 cursor-pointer rounded border-brand-tertiary-light text-brand-primary cursor focus:ring-brand-primary " />
                <label for="remember-me" class="ml-2 block text-sm cursor-pointer hover:text-brand-primary text-brand-tertiary">Recordarme</label>
              </div>
              <a routerLink="/forgot-password" class="text-sm font-normal text-brand-primary hover:underline active:text-brand-secondary">¿Olvidaste tu contraseña?</a>
            </div>

            <div>
              <button type="submit" [disabled]="isLoading()" class="group relative flex w-full justify-center rounded-full text-brand-tertiary px-4 py-3.5 text-base font-bold transition-all duration-300 cursor-pointer disabled:cursor-not-allowed disabled:opacity-50 bg-brand-secondary border-2 border-[#dcab07] hover:ring-[3px] hover:ring-[#dcab07] hover:bg-brand-secondary active:bg-brand-tertiary active:text-white">
                @if (isLoading()) {
                  <!-- <svg class="mr-3 h-5 w-5 animate-spin text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg> -->
                  Iniciando sesión...
                } @else {
                  <!-- <span class="material-symbols-outlined mr-3 text-[20px]" aria-hidden="true">login</span> -->
                  Iniciar Sesión
                }
              </button>
            </div>

            <p class="text-sm text-center text-brand-tertiary-light mt-4">¿No tienes una cuenta? <a routerLink="/register" class="text-brand-primary active:text-brand-secondary hover:underline transition-colors">Regístrate aquí</a></p>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
