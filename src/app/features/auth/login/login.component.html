<div class="min-h-screen bg-linear-to-b from-brand-primary/20 via-brand-primary/30 to-brand-primary/40 relative">
  <img ngSrc="/images/sections/hero/cursos.jpg" alt="Fondo login" fill class="object-cover opacity-30 pointer-events-none select-none z-0" aria-hidden="true" />

  <main class="flex min-h-screen items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-md relative z-10">
      <!-- Logo -->
      <div class="text-center mb-4">
            <a routerLink="/" class="inline-block rounded-2xl p-4">
              <img ngSrc="/logo/cursala.svg" alt="Cursala Logo" width="300" height="57" priority class="block mx-auto h-12 w-auto max-h-14" style="filter:none;opacity:1" />
            </a>
      </div>

      <!-- Card -->
      <div class="rounded-2xl relative bg-white/90 p-8 shadow-xl">
        <h3 class="mb-6 text-center text-2xl font-bold tracking-tight text-brand-primary">Iniciar Sesión</h3>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6" autocomplete="on">
          @if (errorMessage()) {
            <div class="rounded-md bg-red-50 p-4">
              <div class="flex">
                <div class="shrink-0">
                  <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                </div>
                <div class="ml-3">
                  <p class="text-sm font-medium text-red-800">{{ errorMessage() }}</p>
                </div>
              </div>
            </div>
          }

          <div>
            <label for="username" class="block text-sm font-medium text-brand-tertiary">Usuario o Email</label>
            <div class="mt-1 relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 material-symbols-outlined text-[20px]">person</span>
              <input id="username" type="text" formControlName="username" placeholder="Ingresa tu usuario" class="block w-full rounded-lg border border-gray-300 bg-gray-50 py-3 pl-10 pr-3 text-gray-900 placeholder-gray-400 transition focus:border-brand-primary focus:outline-none focus:ring-2 focus:ring-brand-primary" required />
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
            <div class="mt-1 relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 material-symbols-outlined text-[20px]">lock</span>
              <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Ingresa tu contraseña" class="block w-full rounded-lg border border-gray-300 bg-gray-50 py-3 pl-10 pr-10 text-gray-900 placeholder-gray-400 transition focus:border-brand-primary focus:outline-none focus:ring-2 focus:ring-brand-primary" required />
              <button type="button" (click)="togglePassword()" aria-label="Mostrar contraseña" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 material-symbols-outlined text-[20px]">
                {{ showPassword() ? 'visibility_off' : 'visibility' }}
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input id="remember-me" type="checkbox" class="h-4 w-4" />
              <label for="remember-me" class="ml-2 block text-sm">Recordarme</label>
            </div>
            <a routerLink="/forgot-password" class="text-sm font-medium text-brand-primary">¿Olvidaste tu contraseña?</a>
          </div>

          <div>
            <button type="submit" [disabled]="isLoading()" class="group relative flex w-full justify-center rounded-full px-4 py-3.5 text-base font-bold transition-all duration-300 btn-brand focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed">
              @if (isLoading()) {
                <svg class="mr-3 h-5 w-5 animate-spin text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
                Iniciando sesión...
              } @else {
                <span class="material-symbols-outlined mr-3 text-[20px]" aria-hidden="true">login</span>
                Iniciar Sesión
              }
            </button>
          </div>

          <p class="text-sm text-center text-brand-tertiary-light mt-4">¿No tienes una cuenta? <a routerLink="/register" class="text-brand-primary">Regístrate aquí</a></p>
        </form>
      </div>
    </div>
  </main>
</div>
