<div class="min-h-screen bg-linear-to-b from-brand-primary/20 via-brand-primary/30 to-brand-primary/40 relative">
  <img ngSrc="/images/sections/hero/cursos.jpg" alt="Fondo" width="1200" height="700" class="absolute inset-0 object-cover w-full h-full opacity-30 pointer-events-none select-none z-0" aria-hidden="true" />
  <main class="flex min-h-screen items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-md relative z-10">
      <div class="text-center mb-4">
        <a routerLink="/" class="inline-block rounded-2xl p-4">
          <img ngSrc="/logo/cursala.svg" alt="Cursala Logo" width="300" height="57" priority class="block mx-auto h-12 w-auto max-h-14" style="filter:none;opacity:1" />
        </a>
      </div>

      <div class="rounded-2xl relative bg-white/90 p-8 shadow-xl">
        <h2 class="mb-6 text-center text-2xl font-bold tracking-tight text-brand-primary">Restablecer contraseña</h2>
        <p class="mb-4 text-center text-sm text-brand-tertiary-light">Ingresa el correo asociado a tu cuenta</p>

        <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()" autocomplete="on">
          <div class="space-y-4">
            <div>
              <label for="email" class="block text-sm font-medium text-brand-tertiary mb-1">Correo electrónico</label>
              <div class="mt-1 relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 material-symbols-outlined text-[20px]">email</span>
                <input id="email" type="email" formControlName="email" required placeholder="tu@correo.com" class="block w-full rounded-lg border border-gray-300 bg-gray-50 py-3 pl-10 pr-3 text-gray-900 placeholder-gray-400 transition focus:border-brand-primary focus:outline-none focus:ring-2 focus:ring-brand-primary" />
              </div>
              @if (hasError('email','required')) {
                <p class="text-sm text-red-600">El correo es requerido</p>
              }
              @if (hasError('email','email')) {
                <p class="text-sm text-red-600">Ingresa un correo válido</p>
              }
            </div>
          </div>

          <div>
            <button type="submit" [disabled]="isLoading" class="group relative flex w-full justify-center rounded-full px-4 py-3.5 text-base font-bold transition-all duration-300 btn-brand focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed">
              @if (isLoading) {
                <svg class="mr-3 h-5 w-5 animate-spin text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
                Enviando...
              } @else {
                Enviar correo de restablecimiento
              }
            </button>
          </div>

          <p class="text-sm text-center text-brand-tertiary-light mt-4"><a routerLink="/login" class="text-brand-primary">Volver al inicio</a></p>
        </form>
      </div>
    </div>
  </main>
</div>
