<div class="min-h-screen bg-linear-to-t from-brand-primary/90 to-white">
  <img ngSrc="/images/sections/hero/cursos.jpg" alt="Fondo" fill width="100%" height="auto" class="object-cover object-center opacity-10 pointer-events-none select-none z-0" aria-hidden="true" />
  <main>
    <div class="flex min-h-screen items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
      <div class="w-full max-w-md">
        <div class="text-center">
          <span class="inline-block rounded-2xl p-4">
            <img ngSrc="/logo/cursala.svg" alt="Cursala Logo"  width="220" height="66" priority class="mx-auto" style="color: transparent;" />
          </span>
        </div>

        <!-- Card -->
        <div class="rounded-2xl relative bg-white/85 p-8 shadow-xl">
          <h2 class="mb-2 text-center text-2xl font-bold text-brand-primary">Restablecer contraseña</h2>

          <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
            <div class="space-y-4">
              <!-- Token se guarda en campo oculto; no mostramos mensajes adicionales -->
              <input type="hidden" formControlName="token" />

              <div class="mt-4">
                <label for="newPassword" class="block text-sm font-normal text-brand-tertiary mb-1">Nueva contraseña</label>
                <input id="newPassword" type="password" formControlName="newPassword" required class="block w-full rounded-lg border border-gray-300 bg-gray-50 py-3 pl-10 pr-3 text-gray-900 placeholder-gray-400 transition focus:border-brand-primary focus:outline-none focus:ring-2 focus:ring-brand-primary" placeholder="Nueva contraseña" />
                @if (hasError('newPassword','required')) {
                  <p class="mt-1 text-sm text-red-600">La contraseña es requerida</p>
                }
                @if (hasError('newPassword','minlength')) {
                  <p class="mt-1 text-sm text-red-600">La contraseña debe tener al menos 8 caracteres</p>
                }
              </div>

              <div class="mt-4">
                <label for="confirmPassword" class="block text-sm font-normal text-brand-tertiary mb-1">Confirmar contraseña</label>
                <input id="confirmPassword" type="password" formControlName="confirmPassword" required class="block w-full rounded-lg border border-gray-300 bg-gray-50 py-3 pl-10 pr-3 text-gray-900 placeholder-gray-400 transition focus:border-brand-primary focus:outline-none focus:ring-2 focus:ring-brand-primary" placeholder="Confirmar contraseña" />
                @if (hasError('confirmPassword','required')) {
                  <p class="mt-1 text-sm text-red-600">Confirmar la contraseña es requerido</p>
                }
              </div>
            </div>

            <div>
              <button type="submit" [disabled]="isLoading || !hasToken" class="group relative flex w-full mt-6 justify-center rounded-full text-brand-tertiary px-4 py-3.5 text-base font-bold transition-all duration-300 cursor-pointer disabled:cursor-not-allowed disabled:opacity-50 bg-brand-secondary border-2 border-[#dcab07] hover:ring-[3px] hover:ring-[#dcab07] hover:bg-brand-secondary active:bg-brand-tertiary active:text-white">
                @if (isLoading) {
                  Restableciendo...
                } @else {
                  Restablecer contraseña
                }
              </button>
            </div>

            <div class="text-center text-sm text-gray-600">
              <a routerLink="/login" class="text-brand-primary ml-1 active:text-brand-secondary hover:underline transition-colors">Volver al inicio</a>
            </div>
          </form>
        </div>

      </div>
    </div>
  </main>


  <div class="max-w-md w-full space-y-8">
    

    
  </div>
</div>
